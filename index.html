<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Palak</title>
    
    <link rel="preload" href="tata.jpg" as="image">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --cherry-red: #D2042D;
            --cherry-dark: #99001f;
            --black-lavender-1: #1a1124;
            --black-lavender-2: #2d1e3e;
            --text-light: #f5f0fa;
            --modal-bg: #111111; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #000; 
            color: var(--text-light);
            overflow-x: hidden;
            min-height: 100vh;
            transition: background 1.5s ease-in-out;
            cursor: url('https://img.icons8.com/fluency/24/magic-wand.png'), auto;
        }

        body.lights-on {
            background: linear-gradient(135deg, var(--black-lavender-1), var(--black-lavender-2), var(--black-lavender-1));
            background-size: 200% 200%;
            animation: gradientShift 10s ease infinite;
        }

        @keyframes gradientShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .star { position: absolute; background-color: white; border-radius: 50%; z-index: 0; animation: twinkle infinite alternate ease-in-out; pointer-events: none; }

        #dark-room { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #000; z-index: 1000; transition: opacity 1s ease-out; text-align: center; padding: 20px; }
        #password-gate { animation: fadeIn 1.5s ease-in-out; position: relative; }

        .lock-icon { font-size: 3rem; margin-bottom: 10px; }
        .question-text { font-size: 1.3rem; margin-bottom: 5px; color: #bfa4d8; font-weight: 600; }
        
        .hint-container { margin-bottom: 15px; font-size: 0.95rem; color: #ccc; }
        .hint-btn { background: rgba(255,255,255,0.1); border: 1px solid white; color: #fff; font-size: 1rem; cursor: pointer; padding: 2px 8px; border-radius: 50%; margin-left: 5px; transition: all 0.3s; }
        .hint-btn:hover { background: white; color: black; box-shadow: 0 0 10px white; }
        #pass-hint { display: none; color: #ffb6c1; font-size: 1rem; margin-top: 10px; font-style: italic; animation: fadeIn 0.5s ease-in; font-weight: bold; text-shadow: 0 0 5px rgba(255,182,193,0.5); }

        #pass-input { padding: 12px 20px; font-size: 1.2rem; border-radius: 25px; border: 2px solid var(--cherry-red); background: rgba(255, 255, 255, 0.1); color: white; outline: none; text-align: center; font-family: 'Poppins', sans-serif; margin-bottom: 20px; transition: all 0.3s ease; width: 80%; max-width: 300px; display: block; margin: 0 auto 20px auto; }
        #pass-input:focus { background: rgba(255, 255, 255, 0.2); box-shadow: 0 0 15px rgba(210, 4, 45, 0.5); }

        .switch-btn { background: transparent; color: #fff; border: 2px solid #fff; padding: 12px 35px; font-size: 1.2rem; border-radius: 30px; cursor: pointer; box-shadow: 0 0 15px rgba(255,255,255,0.5); transition: all 0.3s ease; font-family: 'Poppins', sans-serif; }
        .switch-btn:hover { background: #fff; color: #000; box-shadow: 0 0 30px rgba(255,255,255,0.8); }

        #error-msg { color: var(--cherry-red); margin-top: 15px; display: none; font-weight: bold; font-size: 1.1rem; }

        #main-screen { display: none; flex-direction: column; align-items: center; padding: 50px 20px; position: relative; z-index: 10; }

        .photo-container { margin-top: 20px; position: relative; perspective: 1000px; animation: dropDown 1.5s ease-out; z-index: 15; cursor: pointer; }
        .flip-box-inner { width: 250px; height: 250px; text-align: center; transition: transform 0.8s; transform-style: preserve-3d; border-radius: 50%; box-shadow: 0 0 30px rgba(210, 4, 45, 0.5); animation: pulseFrame 3s infinite alternate; }
        .photo-container:hover .flip-box-inner { transform: rotateY(180deg); }
        .flip-box-front, .flip-box-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 50%; border: 5px solid var(--cherry-red); padding: 8px; background: rgba(255, 255, 255, 0.1); overflow: hidden; }
        .flip-box-front img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .flip-box-back { transform: rotateY(180deg); background: var(--cherry-red); color: white; display: flex; align-items: center; justify-content: center; font-family: 'Dancing Script', cursive; font-size: 3rem; position: relative; }
        .flip-box-back img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 50%; object-fit: cover; opacity: 0.3; z-index: 1; transition: opacity 0.5s ease-in-out; }
        .flip-box-back span { z-index: 2; position: relative; text-shadow: 2px 2px 5px rgba(0,0,0,0.8); }

        h1 { font-family: 'Dancing Script', cursive; font-size: 4rem; margin-top: 20px; color: var(--cherry-red); text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5); text-align: center;}
        .nickname { font-size: 1.5rem; color: #bfa4d8; margin-bottom: 20px; letter-spacing: 2px; }

        .message-box { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 15px; padding: 25px; max-width: 600px; text-align: center; margin: 15px 0; line-height: 1.6; font-size: 1.1rem; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37); display: none; min-height: 80px; text-shadow: 1px 1px 3px rgba(0,0,0,0.5); }

        #cake-section { display: none; margin: 60px 0 40px 0; text-align: center; animation: fadeIn 2s ease-in; width: 100%;}
        
        #secret-wish {
            padding: 15px 20px; border-radius: 30px; border: 2px solid var(--cherry-red);
            background: rgba(255, 255, 255, 0.1); color: white; text-align: center;
            font-family: 'Poppins', sans-serif; font-size: 1.1rem; width: 90%; max-width: 400px;
            display: block; margin: 0 auto; outline: none; transition: all 0.5s ease;
            box-shadow: 0 0 15px rgba(210, 4, 45, 0.3); backdrop-filter: blur(5px);
        }
        #secret-wish:focus {
            background: rgba(255, 255, 255, 0.2); box-shadow: 0 0 25px rgba(210, 4, 45, 0.6);
        }

        .cake-wrapper { position: relative; width: 220px; height: 180px; margin: 0 auto 30px auto; z-index: 10;}
        .plate { position: absolute; bottom: -10px; left: -15px; width: 250px; height: 40px; background: #e0e0e0; border-radius: 50%; box-shadow: 0 10px 15px rgba(0,0,0,0.6); border-bottom: 5px solid #ccc; z-index: 1; }
        .tier-1 { position: absolute; bottom: 10px; left: 10px; width: 200px; height: 80px; background: #ffb6c1; border-radius: 10px; box-shadow: inset -15px 0 rgba(0,0,0,0.1); z-index: 2; border-bottom: 6px solid #8b4513; }
        .tier-2 { position: absolute; bottom: 90px; left: 35px; width: 150px; height: 60px; background: #ff69b4; border-radius: 10px; box-shadow: inset -10px 0 rgba(0,0,0,0.1); z-index: 3; }
        .frosting-1 { position: absolute; top: 0; left: 0; width: 100%; height: 25px; background: #fff; border-radius: 10px 10px 15px 15px; z-index: 4; }
        .frosting-1::after { content: ''; position: absolute; top: 20px; left: 10px; width: 20px; height: 25px; background: #fff; border-radius: 50%; box-shadow: 40px 5px 0 -2px #fff, 80px -5px 0 2px #fff, 120px 8px 0 -4px #fff, 160px 0 0 0 #fff; }
        .frosting-2 { position: absolute; top: 0; left: 0; width: 100%; height: 20px; background: #fff; border-radius: 10px 10px 15px 15px; z-index: 4; }
        .frosting-2::after { content: ''; position: absolute; top: 15px; left: 15px; width: 15px; height: 20px; background: #fff; border-radius: 50%; box-shadow: 35px 8px 0 -2px #fff, 75px -2px 0 1px #fff, 110px 5px 0 -3px #fff; }

        .candle-container { display: flex; justify-content: space-evenly; position: absolute; width: 100%; top: -35px; left: 0; z-index: 5; padding: 0 20px; }
        .candle { width: 12px; height: 40px; background: repeating-linear-gradient(45deg, white, white 5px, var(--cherry-red) 5px, var(--cherry-red) 10px); position: relative; border-radius: 3px; cursor: pointer; outline: none; box-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
        .candle:focus { box-shadow: 0 0 10px #bfa4d8; }
        .flame { width: 16px; height: 24px; background: gold; border-radius: 50% 50% 20% 20%; position: absolute; top: -24px; left: -2px; animation: flicker 0.5s infinite alternate; box-shadow: 0 0 15px gold, 0 0 30px orange; transition: all 0.3s ease-out; }
        .flame.extinguished { animation: none !important; opacity: 0 !important; transform: scale(0) !important; }

        .gifts-section { display: none; gap: 20px; flex-wrap: wrap; justify-content: center; margin-top: 20px; animation: dropDown 1s ease;}
        .gift-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(210, 4, 45, 0.4); border-radius: 15px; width: 220px; padding: 20px; text-align: center; transition: all 0.4s ease; z-index: 20; position: relative; outline: none; box-shadow: 0 4px 15px rgba(0,0,0,0.2); display: flex; flex-direction: column; align-items: center;}
        
        .gift-card.clickable-card { cursor: pointer; }
        .gift-card.clickable-card:hover, .gift-card.clickable-card:focus { background: rgba(210, 4, 45, 0.15); border-color: rgba(255,255,255,0.4); }
        .gift-card.clickable-card:not(#gift-card-4):hover { transform: translateY(-10px); box-shadow: 0 10px 25px rgba(210, 4, 45, 0.4); }

        .gift-icon img { width: 70px; animation: bounce 3s infinite; }
        
        .scratch-container { position: relative; width: 100%; height: 100px; margin-top: 15px; border-radius: 10px; overflow: hidden; }
        .scratch-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; touch-action: none; cursor: pointer; }
        .gift-content { display: none; width: 100%; height: 100%; align-items: center; justify-content: center; font-size: 0.95rem; color: #fff; font-weight: bold; text-shadow: 1px 1px 2px black; padding: 5px; }
        
        .normal-content { display: none; margin-top: 15px; font-size: 0.95rem; color: #fff; font-weight: bold; text-shadow: 1px 1px 2px black; }

        .btn { background: var(--cherry-red); color: white; border: none; padding: 10px 20px; font-size: 1.1rem; border-radius: 30px; cursor: pointer; font-weight: 600; box-shadow: 0 5px 15px rgba(210, 4, 45, 0.4); transition: transform 0.3s ease; position: relative; z-index: 20; margin-top: 15px;}
        .btn:hover { transform: scale(1.05); }

        #secret-message { background: linear-gradient(135deg, rgba(210, 4, 45, 0.8), rgba(153, 0, 31, 0.8)); border: 2px solid gold; box-shadow: 0 0 40px rgba(255, 215, 0, 0.4); display: none; z-index: 20; position: relative; }
        #secret-message h2 { font-family: 'Dancing Script', cursive; font-size: 2.5rem; color: gold; margin-bottom: 10px;}
        
        .signature-block { display: none; margin-top: 40px; margin-bottom: 40px; text-align: center; z-index: 20; position: relative; text-shadow: 1px 1px 3px rgba(0,0,0,0.8); }
        .sign-off-text { font-family: 'Poppins', sans-serif; font-size: 1.2rem; color: #e0e0e0; display: block; letter-spacing: 1px; }
        .my-name { font-family: 'Dancing Script', cursive; font-size: 4rem; color: var(--cherry-red); text-shadow: 2px 2px 10px rgba(210, 4, 45, 0.7); display: inline-block; margin-top: 5px; }

        .petal { position: fixed; top: -10vh; background: linear-gradient(135deg, var(--cherry-red), #ff4d6d); border-radius: 50% 0 50% 50%; z-index: 1; pointer-events: none; box-shadow: 0 0 5px rgba(0,0,0,0.2); }

        #ribbon-btn {
            position: fixed; bottom: 40px; right: -250px; 
            background: linear-gradient(135deg, var(--cherry-red), #ff4d6d); color: #fff; 
            font-family: 'Poppins', sans-serif; font-weight: bold; font-size: 1.1rem;
            padding: 12px 20px 12px 30px; border: 2px solid #fff; border-right: none;
            border-radius: 30px 0 0 30px; cursor: pointer; box-shadow: -5px 5px 15px rgba(0,0,0,0.5); 
            z-index: 1000; transition: right 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); width: 180px; 
        }
        #ribbon-btn.show-ribbon { right: -85px; }
        #ribbon-btn.show-ribbon:hover { right: 0; box-shadow: -5px 5px 25px rgba(210, 4, 45, 0.8); }
        
        #eat-modal { position: fixed; inset: 0; background: var(--modal-bg); z-index: 2000; display: none; justify-content: center; align-items: center; flex-direction: column; text-align: center; }
        #eat-title { font-family: 'Dancing Script', cursive; font-size: 3rem; color: #ffb6c1; margin-bottom: 30px; animation: fadeIn 1s ease; pointer-events: none; }
        
        #big-cake-container { position: relative; cursor: pointer; transform: scale(1.5); transition: transform 0.4s ease, opacity 0.5s ease; }
        #big-cake-container:active { transform: scale(1.4); }
        
        .bite-mark { position: absolute; background: var(--modal-bg); border-radius: 50%; pointer-events: none; z-index: 100; transform: scale(0); animation: bitePop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .cake-shake-anim { animation: shakeCake 0.3s ease; }

        /* 🔥 CERTIFICATE STYLES 🔥 */
        #cert-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 3000; display: none;
            justify-content: center; align-items: flex-start; padding: 40px 20px; 
            overflow-y: auto; -webkit-overflow-scrolling: touch; opacity: 0; transition: opacity 1s ease;
        }
        
        .cert-modal-content { display: flex; flex-direction: column; align-items: center; margin: auto; width: 100%; max-width: 650px; }

        .cert-box {
            background: linear-gradient(135deg, #fffcf2 0%, #faedcd 100%); 
            border: 14px solid #d4af37; 
            padding: 45px 35px; border-radius: 12px;
            text-align: center; width: 100%; color: #333; position: relative;
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.5), inset 0 0 30px rgba(0,0,0,0.05); 
            animation: dropDown 1s ease forwards;
        }
        
        .cert-box::before { 
            content: ''; position: absolute; inset: 10px; 
            border: 3px double #b8860b; /* Elegant Double Line */
            pointer-events: none; opacity: 0.7;
        }
        
        .cert-header { font-family: 'Dancing Script', cursive; font-size: 3.8rem; color: #99001f; margin-bottom: 5px; line-height: 1.2; text-shadow: 2px 2px 4px rgba(0,0,0,0.15);}
        .cert-sub { font-family: 'Poppins', sans-serif; font-size: 1rem; color: #666; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 15px; font-weight: 600;}
        .cert-name { font-family: 'Dancing Script', cursive; font-size: 3.2rem; color: #d2042d; margin: 15px 0; border-bottom: 2px solid #d4af37; display: inline-block; padding: 0 30px;}
        
        .cert-body { 
            font-family: 'Poppins', sans-serif; font-size: 1.05rem; 
            line-height: 1.8; color: #444; margin: 30px 0; font-weight: 500; 
        }
        .cert-body p { margin-bottom: 18px; } /* Adding proper spaces between lines */
        
        .highlight-title { font-family: 'Dancing Script', cursive; font-size: 2.2rem; color: #d2042d; display: inline-block; margin-top: 5px;}
        .highlight-text { font-weight: 700; color: #99001f; }
        .bday-text { font-family: 'Dancing Script', cursive; font-size: 2.6rem; color: #d2042d; display: block; margin-top: 15px; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); }

        .cert-footer { display: flex; justify-content: space-between; align-items: flex-end; margin-top: 30px; padding: 0 20px; font-family: 'Dancing Script', cursive; font-size: 1.8rem; color: #99001f;}
        
        .wax-seal {
            background: radial-gradient(circle at 30% 30%, #e60026, #99001f); 
            color: #ffd700; width: 100px; height: 100px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center; font-weight: bold; margin: 0 auto;
            box-shadow: inset 0 0 15px #550000, 0 8px 15px rgba(0,0,0,0.4); 
            font-family: 'Dancing Script', cursive; font-size: 1.2rem; line-height: 1.2; 
            border: 3px solid #d4af37; z-index: 10; position: relative; text-shadow: 1px 1px 2px rgba(0,0,0,0.6);
        }

        @media (max-width: 600px) {
            .cert-header { font-size: 2.5rem; }
            .cert-name { font-size: 2.2rem; padding: 0 15px; }
            .cert-sub { font-size: 0.85rem; letter-spacing: 1.5px;}
            .cert-body { font-size: 0.95rem; margin: 20px 0; }
            .highlight-title { font-size: 1.8rem; }
            .bday-text { font-size: 2.2rem; }
            .cert-box { padding: 30px 20px; border-width: 10px; }
            .cert-box::before { inset: 6px; }
            .cert-footer { flex-direction: column; align-items: center; text-align: center; gap: 20px; margin-top: 20px; padding: 0; }
            .wax-seal { margin: 10px auto; width: 90px; height: 90px; font-size: 1.1rem; }
        }

        @keyframes twinkle { 0% { opacity: 0.3; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1.1); } }
        @keyframes fadeIn { 0% { opacity: 0; } 100% { opacity: 1; } }
        @keyframes dropDown { 0% { transform: translateY(-50px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-15px); } 60% { transform: translateY(-7px); } }
        @keyframes pulseFrame { 0% { box-shadow: 0 0 15px rgba(210, 4, 45, 0.5); } 100% { box-shadow: 0 0 35px rgba(210, 4, 45, 0.9); } }
        @keyframes flicker { 0% { transform: scale(1) rotate(-2deg); opacity: 0.9; } 100% { transform: scale(1.1) rotate(2deg); opacity: 1; } }
        @keyframes fallPetal { 0% { transform: translateY(-10vh) rotate3d(1, 1, 1, 0deg); opacity: 1; } 100% { transform: translateY(110vh) rotate3d(1, 1, 1, 360deg); opacity: 0.4; } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 50% { transform: translateX(10px); } 75% { transform: translateX(-10px); } }
        @keyframes bitePop { to { transform: scale(1); } }
        @keyframes shakeCake { 0%, 100% { transform: scale(1.5) rotate(0deg); } 25% { transform: scale(1.4) rotate(-3deg); } 50% { transform: scale(1.4) rotate(3deg); } 75% { transform: scale(1.4) rotate(-3deg); } }

        #wish-gift-box { font-size: 3.5rem; position: absolute; display: none; z-index: 50; filter: drop-shadow(0 0 15px gold); }
        @keyframes popInGift { 0% { transform: scale(0) rotate(-15deg); opacity: 0; } 70% { transform: scale(1.3) rotate(10deg); opacity: 1; } 100% { transform: scale(1) rotate(0deg); opacity: 1; } }
    </style>
</head>
<body>

    <audio id="bg-music" loop preload="auto">
        <source src="music.mp3" type="audio/mpe
